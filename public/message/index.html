<script>
  document.addEventListener('DOMContentLoaded', function () {
    const theme = localStorage.getItem('theme');

    if (!theme || theme === 'light') {
      setTheme('light');
    } else {
      setTheme(theme);
    }
  });

  function setTheme(theme) {
    const html = document.documentElement;
    localStorage.setItem('theme', theme);

    if (theme === 'light') {
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
      }
    } else {
      if (!html.classList.contains('dark')) {
        html.classList.add('dark');
      }
    }

    const isDark = theme !== 'light';
    const toggleButtons = document.querySelectorAll('.toggle-theme');
    toggleButtons.forEach(function(button) {
      button.setAttribute('aria-pressed', isDark ? 'true' : 'false');
      const lightIcon = button.querySelector('.theme-icon.light');
      const darkIcon = button.querySelector('.theme-icon.dark');
      if (lightIcon) lightIcon.style.display = isDark ? 'inline-block' : 'none';
      if (darkIcon) darkIcon.style.display = isDark ? 'none' : 'inline-block';
    });
  }

  function toggleTheme() {
    const theme = localStorage.getItem('theme');

    if (theme === 'light') {
      setTheme('dark');
    } else {
      setTheme('light');
    }
  }
</script>

<script>
  const backToTopBtn = document.getElementById('backToTop');
  if (backToTopBtn) {
    backToTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    
    window.addEventListener('scroll', () => {
      if (window.scrollY > 200) {
        backToTopBtn.style.display = 'block';
      } else {
        backToTopBtn.style.display = 'none';
      }
    });

    
    backToTopBtn.style.display = 'none';
  }

  function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function foldCornerEntries() {
    const entries = document.querySelectorAll('[data-corner-entry]');
    entries.forEach((entry) => {
      entry.open = false;
    });
  }

  const messageBoard = document.querySelector('[data-message-board]');
  if (messageBoard) {
    const form = messageBoard.querySelector('[data-message-form]');
    const contentInput = messageBoard.querySelector('#guestbook-content');
    const signatureInput = messageBoard.querySelector('#guestbook-signature');
    const replyInput = messageBoard.querySelector('#guestbook-reply');
    const status = messageBoard.querySelector('[data-message-status]');
    const submitButton = form ? form.querySelector('button[type="submit"]') : null;
    const nextInput = form ? form.querySelector('[data-message-next]') : null;
    const replyToInput = form ? form.querySelector('[data-message-replyto]') : null;
    const submittedLocalInput = form ? form.querySelector('[data-message-submitted-local]') : null;
    const timezoneInput = form ? form.querySelector('[data-message-timezone]') : null;
    const formAction = form ? (form.getAttribute('action') || '').trim() : '';
    const hasAction = formAction.length > 0;
    const submitLabelDefault = submitButton ? (submitButton.getAttribute('data-label-default') || submitButton.textContent.trim() || '写好了') : '写好了';
    const submitLabelConfirm = submitButton ? (submitButton.getAttribute('data-label-confirm') || '确认好了！') : '确认好了！';
    let isAwaitingConfirm = false;

    const normalizeNickname = (value) => value.trim().replace(/\s+/g, ' ').slice(0, 24);
    const normalizeMessage = (value) => value.trim().slice(0, 500);
    const padDateNumber = (value) => String(value).padStart(2, '0');
    const formatLocalDateTime = (date) => {
      const year = date.getFullYear();
      const month = padDateNumber(date.getMonth() + 1);
      const day = padDateNumber(date.getDate());
      const hours = padDateNumber(date.getHours());
      const minutes = padDateNumber(date.getMinutes());
      const seconds = padDateNumber(date.getSeconds());
      return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
    };
    const formatUTCOffset = (date) => {
      const offsetMinutes = -date.getTimezoneOffset();
      const sign = offsetMinutes >= 0 ? '+' : '-';
      const absoluteMinutes = Math.abs(offsetMinutes);
      const offsetHours = padDateNumber(Math.floor(absoluteMinutes / 60));
      const minutes = padDateNumber(absoluteMinutes % 60);
      return `UTC${sign}${offsetHours}:${minutes}`;
    };
    const getTimezoneName = () => {
      try {
        return Intl.DateTimeFormat().resolvedOptions().timeZone || '';
      } catch (error) {
        return '';
      }
    };

    const setStatus = (text, tone = 'normal') => {
      if (!status) return;
      status.dataset.tone = tone;
      status.textContent = '';
      if (!text) {
        status.hidden = true;
        return;
      }
      const lines = String(text).split('\n');
      lines.forEach((line, index) => {
        const lineNode = document.createElement('span');
        lineNode.className = 'message-board-status-line';
        lineNode.textContent = line;
        status.appendChild(lineNode);
        if (index < lines.length - 1) {
          status.appendChild(document.createElement('br'));
        }
      });
      status.hidden = false;
    };

    const setSubmitting = (isSubmitting) => {
      if (!submitButton) return;
      submitButton.disabled = isSubmitting;
      submitButton.setAttribute('aria-busy', isSubmitting ? 'true' : 'false');
    };

    const setConfirmState = (isConfirming) => {
      isAwaitingConfirm = !!isConfirming;
      if (!submitButton) return;
      submitButton.dataset.confirmPending = isAwaitingConfirm ? 'true' : 'false';
      submitButton.textContent = isAwaitingConfirm ? submitLabelConfirm : submitLabelDefault;
    };

    if (status) {
      status.hidden = true;
    }
    setConfirmState(false);

    const url = new URL(window.location.href);
    const isSent = url.searchParams.get('sent') === '1';
    if (isSent) {
      const sentMsRaw = url.searchParams.get('t');
      const sentMs = sentMsRaw ? Number(sentMsRaw) : NaN;
      const sentDate = Number.isFinite(sentMs) && sentMs > 0 ? new Date(sentMs) : new Date();
      const sentAtText = formatLocalDateTime(sentDate).replace(' ', '\u00A0');
      setStatus(`${sentAtText}\n信件已经寄出了！`, 'success');
      url.searchParams.delete('sent');
      url.searchParams.delete('t');
      window.history.replaceState({}, '', url.toString());
    }

    if (!hasAction) {
      if (form) {
        form.setAttribute('aria-disabled', 'true');
      }
      if (contentInput) contentInput.disabled = true;
      if (signatureInput) signatureInput.disabled = true;
      if (replyInput) replyInput.disabled = true;
      setSubmitting(true);
      setStatus('请先在站点配置中填写邮件表单地址。', 'error');
    } else if (form) {
      const clearConfirmStateForEdit = () => {
        if (!isAwaitingConfirm) return;
        setConfirmState(false);
        setStatus('修改修改……', 'normal');
      };

      [contentInput, signatureInput, replyInput].forEach((input) => {
        if (!input) return;
        input.addEventListener('input', clearConfirmStateForEdit, { passive: true });
      });

      form.addEventListener('submit', async (event) => {
        const content = contentInput ? normalizeMessage(contentInput.value) : '';
        const signature = signatureInput ? (normalizeNickname(signatureInput.value) || '香甜的年轮蛋糕') : '香甜的年轮蛋糕';
        const replyAddress = replyInput ? replyInput.value.trim().slice(0, 120) : '';
        if (!content) {
          event.preventDefault();
          setStatus('请填写留言内容。', 'error');
          return;
        }

        if (nextInput) {
          const base = `${window.location.origin}${window.location.pathname}`;
          const nextURL = `${base}?sent=1&t=${Date.now()}`;
          nextInput.value = nextURL;
        }

        event.preventDefault();
        if (contentInput) contentInput.value = content;
        if (signatureInput) signatureInput.value = signature;
        if (replyInput) replyInput.value = replyAddress;

        if (!isAwaitingConfirm) {
          setConfirmState(true);
          setStatus('确认写好了吗？', 'normal');
          return;
        }

        setConfirmState(false);
        setSubmitting(true);
        setStatus('正在发送，请稍候...', 'normal');

        try {
          const submittedAt = new Date();
          if (replyToInput) {
            replyToInput.value = replyAddress;
          }
          if (submittedLocalInput) {
            submittedLocalInput.value = `${formatLocalDateTime(submittedAt)} (${formatUTCOffset(submittedAt)})`;
          }
          if (timezoneInput) {
            const timezoneName = getTimezoneName();
            timezoneInput.value = timezoneName || formatUTCOffset(submittedAt);
          }

          const ajaxAction = formAction.includes('/ajax/')
            ? formAction
            : formAction.replace('://formsubmit.co/', '://formsubmit.co/ajax/');
          const payload = new FormData(form);
          const response = await fetch(ajaxAction, {
            method: 'POST',
            headers: {
              Accept: 'application/json'
            },
            body: payload
          });
          const result = await response.json().catch(() => ({}));

          if (!response.ok) {
            const errorText = (result && typeof result.message === 'string' && result.message.trim())
              ? result.message.trim()
              : `发送失败（${response.status}）`;
            setStatus(errorText, 'error');
            return;
          }

          const sentAtText = formatLocalDateTime(new Date()).replace(' ', '\u00A0');
          setStatus(`${sentAtText}\n信件已经寄出了！`, 'success');
          if (contentInput) contentInput.value = '';
        } catch (error) {
          setStatus('发送失败，请检查网络后重试。', 'error');
        } finally {
          setSubmitting(false);
          if (submitButton && !isAwaitingConfirm) {
            submitButton.textContent = submitLabelDefault;
          }
        }
      });
    }
  }

</script>

            if (!bannerEl) return;
            const bannerUrls = JSON.parse(bannerEl.dataset.banners || "[]");
            if (!Array.isArray(bannerUrls) || bannerUrls.length === 0) return;

            const bannerColorMap = {
              blue: "135, 206, 235",
              purple: "196, 174, 244",
              pink: "236, 180, 203",
              green: "191, 216, 140",
              yellow: "241, 218, 129",
              yellow2: "236, 208, 118",
              brown: "191, 164, 132"
            };

            const getBannerColorKey = function (url) {
              if (!url) return null;
              const match = String(url).match(/banner_([a-z0-9]+)\.[^./?#]+(?:[?#].*)?$/i);
              if (!match || !match[1]) return null;
              return match[1].toLowerCase();
            };

            const parseRgbString = function (value) {
              if (!value) return null;
              const parts = String(value).split(",").map(function (part) {
                return parseInt(part.trim(), 10);
              });
              if (parts.length !== 3 || parts.some(function (n) { return Number.isNaN(n); })) return null;
              return parts.map(function (n) {
                return Math.max(0, Math.min(255, n));
              });
            };

            const clampChannel = function (value) {
              return Math.max(0, Math.min(255, Math.round(value)));
            };

            const selectedBanner = bannerUrls[Math.floor(Math.random() * bannerUrls.length)];
            const selectedColorKey = getBannerColorKey(selectedBanner) || "";
            let baseBannerRgb = null;

            const getAdjustedBannerRgb = function (rgb) {
              if (!Array.isArray(rgb) || rgb.length !== 3) return null;
              if (selectedColorKey !== "brown") return rgb;
              const isDarkMode = document.documentElement.classList.contains("dark");
              const factor = isDarkMode ? 1 : 1.1;
              return rgb.map(function (channel) {
                return clampChannel(channel * factor);
              });
            };

            const applyEffectiveBannerColor = function () {
              if (!baseBannerRgb) return;
              const adjusted = getAdjustedBannerRgb(baseBannerRgb);
              if (!adjusted) return;
              document.documentElement.style.setProperty("--banner-link-rgb", adjusted.join(", "));
            };

            const applyBannerColor = function (url) {
              const colorKey = getBannerColorKey(url);
              if (!colorKey) return;
              const rgb = parseRgbString(bannerColorMap[colorKey]);
              if (!rgb) return;
              baseBannerRgb = rgb;
              applyEffectiveBannerColor();
            };

            const applyBannerOpacityScale = function (url) {
              const colorKey = getBannerColorKey(url);
              const opacityScale =
                colorKey === "brown" ? "0.72" :
                colorKey === "green" ? "0.82" :
                colorKey === "pink" ? "0.84" :
                "1";
              document.documentElement.style.setProperty("--banner-link-opacity-scale", opacityScale);
            };

            const extractDominantBannerColor = function (imgEl) {
              if (!imgEl || !imgEl.naturalWidth || !imgEl.naturalHeight) return null;

              const maxSampleSide = 96;
              const scale = Math.min(1, maxSampleSide / Math.max(imgEl.naturalWidth, imgEl.naturalHeight));
              const sampleWidth = Math.max(1, Math.round(imgEl.naturalWidth * scale));
              const sampleHeight = Math.max(1, Math.round(imgEl.naturalHeight * scale));

              const canvas = document.createElement("canvas");
              canvas.width = sampleWidth;
              canvas.height = sampleHeight;
              const ctx = canvas.getContext("2d", { willReadFrequently: true });
              if (!ctx) return null;

              ctx.drawImage(imgEl, 0, 0, sampleWidth, sampleHeight);

              let pixels;
              try {
                pixels = ctx.getImageData(0, 0, sampleWidth, sampleHeight).data;
              } catch (err) {
                return null;
              }

              const bins = new Map();
              for (let i = 0; i < pixels.length; i += 4) {
                const r = pixels[i];
                const g = pixels[i + 1];
                const b = pixels[i + 2];
                const a = pixels[i + 3];
                if (a < 20) continue;

                const max = Math.max(r, g, b);
                const min = Math.min(r, g, b);
                const saturation = max === 0 ? 0 : (max - min) / max;
                if (saturation < 0.08) continue;

                const key = `${r >> 3},${g >> 3},${b >> 3}`;
                const entry = bins.get(key) || { count: 0, r: 0, g: 0, b: 0, score: 0 };
                entry.count += 1;
                entry.r += r;
                entry.g += g;
                entry.b += b;
                entry.score += (a / 255) * (0.5 + saturation);
                bins.set(key, entry);
              }

              if (bins.size === 0) return null;

              let best = null;
              bins.forEach(function (entry) {
                if (!best || entry.score > best.score) best = entry;
              });

              if (!best || best.count === 0) return null;
              return [
                Math.round(best.r / best.count),
                Math.round(best.g / best.count),
                Math.round(best.b / best.count)
              ];
            };

            applyBannerColor(selectedBanner);
            applyBannerOpacityScale(selectedBanner);
            bannerEl.addEventListener("load", function () {
              const dominantRgb = extractDominantBannerColor(bannerEl);
              if (!dominantRgb) return;
              baseBannerRgb = dominantRgb;
              applyEffectiveBannerColor();
            }, { once: true });
            const themeObserver = new MutationObserver(function () {
              applyEffectiveBannerColor();
            });
            themeObserver.observe(document.documentElement, {
              attributes: true,
              attributeFilter: ["class"]
            });
            bannerEl.src = selectedBanner;
          })();
        </script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) {

        const root = document.documentElement;
        let layer = null;
        let dragBubbleTrailPointerId = null;
        let lastDragBubbleAt = 0;

        const createLayer = function () {
          if (layer) return;
          layer = document.createElement("div");
          layer.id = "global-ripple-layer";
          document.body.appendChild(layer);
        };

        const isFxExcludedTarget = function (event) {
          const target = event.target instanceof Element ? event.target : null;
          if (target && target.closest(".collection-banner-card")) return true;
          if (target && target.closest(".collection-layout-btn")) return true;
          if (target && target.closest(".collection-layout-switch")) return true;
          if (target && target.closest("a[data-codex-zoom=\"1\"]")) return true;
          if (target && target.closest(".collection-auto-link")) return true;
          const titleArea = document.querySelector(".title-interactive");
          if (titleArea && titleArea.contains(event.target)) return true;
          if (target && target.closest(".home-ripple-water[data-ripple-enabled=\"1\"]")) return true;
          if (target && target.closest(".home-ripple-mobile-water[data-ripple-src]")) return true;
          if (target) {
            const tile = target.closest(".home-ripple-tile");
            if (tile && tile.querySelector(".home-ripple-water[data-ripple-enabled=\"1\"]")) return true;
          }
          const kamaboko = document.querySelector(".site-kamaboko-corner");
          if (kamaboko && kamaboko.contains(event.target)) return true;
          return false;
        };

        const spawnRipple = function (event) {
          if (!layer) return;
          if (root.classList.contains("dark")) return;
          if (isFxExcludedTarget(event)) return;

          const ripple = document.createElement("div");
          ripple.className = "global-ripple";
          const bubbleSize = 5 + Math.random() * 55;
          const lineWidth = Math.max(0.1, Math.min(0.48, 0.1 + bubbleSize * 0.0062));
          const swayXDir = Math.random() < 0.5 ? -1 : 1;
          const swayYDir = Math.random() < 0.5 ? -1 : 1;
          const swayX = (0.28 + Math.random() * 0.95) * swayXDir;
          const swayY = (0.22 + Math.random() * 0.7) * swayYDir;
          ripple.style.setProperty("--bubble-size", bubbleSize.toFixed(1) + "px");
          ripple.style.setProperty("--bubble-line", lineWidth.toFixed(2) + "px");
          ripple.style.setProperty("--bubble-sway-x", swayX.toFixed(2) + "px");
          ripple.style.setProperty("--bubble-sway-y", swayY.toFixed(2) + "px");
          ripple.style.left = event.clientX + "px";
          ripple.style.top = event.clientY + "px";
          ripple.innerHTML = "<span class=\"bubble-drift\"><span class=\"bubble-shell\"></span><span class=\"bubble-highlight\"></span><span class=\"bubble-highlight-2\"></span><span class=\"bubble-dot\"></span></span>";
          layer.appendChild(ripple);

          window.setTimeout(function () {
            ripple.remove();
          }, 1200);
        };

        const spawnMeteor = function (event) {
          if (!layer) return;
          if (!root.classList.contains("dark")) return;
          if (isFxExcludedTarget(event)) return;

          const meteor = document.createElement("span");
          meteor.className = "global-meteor";
          const sweep = 92 + Math.random() * 50;
          const pre = sweep * 0.5;
          const post = sweep * 0.5;
          const length = 34 + Math.random() * 38;
          const tilt = Math.random() * 45;
          const angle = Math.random() < 0.5 ? tilt : 180 - tilt;
          meteor.style.setProperty("--meteor-length", length.toFixed(1) + "px");
          meteor.style.setProperty("--meteor-pre", pre.toFixed(1) + "px");
          meteor.style.setProperty("--meteor-post", post.toFixed(1) + "px");
          meteor.style.setProperty("--meteor-angle", angle.toFixed(1) + "deg");
          meteor.style.left = (event.clientX + 14) + "px";
          meteor.style.top = (event.clientY - 3) + "px";
          layer.appendChild(meteor);

          window.setTimeout(function () {
            meteor.remove();
          }, 840);
        };

        const dismissBubbleAtPointer = function (event) {
          if (!layer || root.classList.contains("dark")) return false;
          const ripples = layer.querySelectorAll(".global-ripple");
          for (let i = ripples.length - 1; i >= 0; i -= 1) {
            const ripple = ripples[i];
            const x = parseFloat(ripple.style.left);
            const y = parseFloat(ripple.style.top);
            const size = parseFloat(ripple.style.getPropertyValue("--bubble-size") || "0");
            if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(size) || size <= 0) continue;
            const dx = event.clientX - x;
            const dy = event.clientY - y;
            const hitRadius = size * 0.42;
            if ((dx * dx) + (dy * dy) <= (hitRadius * hitRadius)) {
              ripple.remove();
              return true;
            }
          }
          return false;
        };

        const spawnClickFx = function (event) {
          if (event.pointerType === "mouse" && event.button !== 0) return;
          if (isFxExcludedTarget(event)) return;
          if (!root.classList.contains("dark") && dismissBubbleAtPointer(event)) return;
          if (!root.classList.contains("dark")) {
            dragBubbleTrailPointerId = event.pointerId;
            lastDragBubbleAt = 0;
          }
          if (root.classList.contains("dark")) {
            spawnMeteor(event);
          } else {
            spawnRipple(event);
          }
        };

        const spawnDragBubbleTrail = function (event) {
          if (root.classList.contains("dark")) return;
          if (dragBubbleTrailPointerId == null) return;
          if (event.pointerId !== dragBubbleTrailPointerId) return;
          if ((event.buttons & 1) === 0) return;
          const now = Date.now();
          if (now - lastDragBubbleAt < 118) return;
          lastDragBubbleAt = now;
          spawnRipple(event);
        };

        const stopDragBubbleTrail = function (event) {
          if (dragBubbleTrailPointerId == null) return;
          if (event && event.pointerId != null && event.pointerId !== dragBubbleTrailPointerId) return;
          dragBubbleTrailPointerId = null;
        };

        const syncRippleMode = function () {
          createLayer();
        };

        syncRippleMode();
        document.addEventListener("pointerdown", spawnClickFx, { passive: true });
        document.addEventListener("pointermove", spawnDragBubbleTrail, { passive: true });
        document.addEventListener("pointerup", stopDragBubbleTrail, { passive: true });
        document.addEventListener("pointercancel", stopDragBubbleTrail, { passive: true });
        const observer = new MutationObserver(syncRippleMode);
        observer.observe(root, { attributes: true, attributeFilter: ["class"] });
      });
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {

          return rainLayer;

        const ensureCenterLayer = function () {
          if (centerLayer && centerLayer.isConnected) return centerLayer;
          centerLayer = document.createElement("div");
          centerLayer.id = "kamaboko-center-layer";
          document.body.appendChild(centerLayer);
          return centerLayer;
        };

        const ensureRollLayer = function () {
          if (rollLayer && rollLayer.isConnected) return rollLayer;
          rollLayer = document.createElement("div");
          rollLayer.id = "kamaboko-roll-layer";
          document.body.appendChild(rollLayer);
          return rollLayer;
        };

        const setKamabokoPressing = function (pressing) {
          kamaboko.classList.toggle("is-pressing", !!pressing);

        const spawnKamabokoRain = function () {
          const layer = ensureRainLayer();
          const src = kamaboko.getAttribute("src");
          if (!src) return;

          const width = window.innerWidth || document.documentElement.clientWidth || 0;
          const count = width >= 912 ? 48 : 36;

          for (let i = 0; i < count; i += 1) {
            const piece = document.createElement("img");
            const delay = Math.random() * 260;
            const duration = 700 + Math.random() * 5600;
            const drift = (-170 + Math.random() * 340).toFixed(1) + "px";
            const rotStart = (-90 + Math.random() * 180).toFixed(1) + "deg";
            let rotEndValue = -10080 + Math.random() * 20160;
            const sizeBias = 1 - Math.pow(Math.random(), 2.4);
            let sizeValue = 64 + sizeBias * 216;
            if (Math.random() < 0.12) {
              sizeValue *= 1.8 + Math.random() * 1.1;
              rotEndValue *= 1.8 + Math.random() * 1.1;
            }
            const rotEnd = rotEndValue.toFixed(1) + "deg";
            const size = sizeValue.toFixed(1) + "px";

            piece.style.setProperty("--kamaboko-rain-opacity", opacity);
            piece.style.setProperty("--kamaboko-rain-scale", scale);

                piece.remove();

        const spawnKamabokoCenterBloom = function () {

          const piece = document.createElement("div");
          const pieceImg = document.createElement("img");
          const buttonRect = kamaboko.getBoundingClientRect();
          const initialWidth = Math.max(1, buttonRect.width * 2);
          const viewportWidth = window.innerWidth || document.documentElement.clientWidth || 0;
          const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
          const ratio = (kamaboko.naturalWidth && kamaboko.naturalHeight)
            ? (kamaboko.naturalWidth / kamaboko.naturalHeight)
            : (buttonRect.width && buttonRect.height ? (buttonRect.width / buttonRect.height) : 1);
          const safeViewport = Math.max(1, Math.min(viewportWidth, viewportHeight) * 0.9);
          const safeWidthForRotation = safeViewport / Math.sqrt(1 + Math.pow(1 / Math.max(ratio, 0.001), 2));
          const maxWidth = Math.max(initialWidth, safeWidthForRotation * 2);
          const scaleMax = Math.max(1, maxWidth / initialWidth);
          const scaleMin = 0.02;
          const spinDir = Math.random() < 0.5 ? -1 : 1;
          const rotStartValue = Math.random() * 360;
          const rotEndValue = rotStartValue + (spinDir * (4320 + Math.random() * 2160));

                piece.remove();
              }, { once: true });

        const handleKamabokoActivate = function (event) {
          event.preventDefault();

        kamaboko.addEventListener("click", handleKamabokoActivate);
        kamaboko.addEventListener("keydown", function (event) {
          if (event.key !== "Enter" && event.key !== " ") return;
          handleKamabokoActivate(event);

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const stickyBar = document.querySelector(".site-sticky-bar");
        const stickySentinel = document.querySelector(".site-sticky-sentinel");
        const stickyNav = stickyBar ? stickyBar.querySelector(".site-sticky-nav") : null;
        const mobileMenuToggle = stickyNav ? stickyNav.querySelector(".site-mobile-menu-toggle") : null;
        const mobileMenuPanel = stickyNav ? stickyNav.querySelector("#site-mobile-menu-panel") : null;
        const mobileSubmenuLinks = stickyNav ? stickyNav.querySelectorAll("[data-mobile-submenu-link]") : [];
        const root = document.documentElement;
        if (!stickyBar || !stickySentinel) return;

        const isMobileNav = function() {
          return window.matchMedia("(max-width: 911px)").matches;
        };

        const setMobileSubmenuExpanded = function(link, expanded) {
          if (!link) return;
          const submenuId = link.getAttribute("aria-controls");
          if (!submenuId) return;
          const submenu = stickyNav ? stickyNav.querySelector("#" + submenuId) : null;
          link.setAttribute("aria-expanded", expanded ? "true" : "false");
          if (submenu) {
            submenu.hidden = !expanded;
          }
        };

        const resetMobileSubmenus = function() {
          for (let i = 0; i < mobileSubmenuLinks.length; i += 1) {
            setMobileSubmenuExpanded(mobileSubmenuLinks[i], false);
          }
        };

        const setMobileMenuOpen = function(open) {
          if (!mobileMenuToggle || !mobileMenuPanel) return;
          mobileMenuToggle.setAttribute("aria-expanded", open ? "true" : "false");
          mobileMenuPanel.hidden = !open;
          if (open) {
            resetMobileSubmenus();
          }
        };

        const updateSubmenuState = function() {
          if (!stickyNav) {
            stickyBar.classList.remove("is-submenu-open");
            stickyBar.style.setProperty("--sticky-submenu-extent", "0px");
            return;
          }
          if (isMobileNav()) {
            const hasOpenMobileMenu = !!(mobileMenuPanel && !mobileMenuPanel.hidden);
            if (!hasOpenMobileMenu) {
              stickyBar.classList.remove("is-submenu-open");
              stickyBar.style.setProperty("--sticky-submenu-extent", "0px");
              return;
            }
            const stickyBarRect = stickyBar.getBoundingClientRect();
            const panelRect = mobileMenuPanel.getBoundingClientRect();
            const submenuExtent = Math.max(0, Math.ceil(panelRect.bottom - stickyBarRect.bottom));
            stickyBar.style.setProperty("--sticky-submenu-extent", submenuExtent + "px");
            stickyBar.classList.add("is-submenu-open");
            return;
          }
          const dropdownItems = stickyNav.querySelectorAll("li.nav-with-dropdown");
          let hasOpenDropdown = false;
          let maxSubmenuBottom = 0;
          const stickyBarRect = stickyBar.getBoundingClientRect();
          for (let i = 0; i < dropdownItems.length; i += 1) {
            const item = dropdownItems[i];
            const submenu = item.querySelector(".nav-submenu");
            if (!submenu) continue;
            const hasHover = item.matches(":hover");
            const hasFocusVisible = item.querySelector(":focus-visible") !== null;
            const isOpen = hasHover || hasFocusVisible;
            item.classList.toggle("is-open", isOpen);
            if (isOpen) {
              hasOpenDropdown = true;
              const submenuRect = submenu.getBoundingClientRect();
              if (submenuRect.bottom > maxSubmenuBottom) {
                maxSubmenuBottom = submenuRect.bottom;

              item.classList.remove("is-open");

          stickyBar.classList.toggle("is-submenu-open", hasOpenDropdown);
        };

        const queueSubmenuStateUpdate = function() {
          window.requestAnimationFrame(updateSubmenuState);
        };

        const closeSubmenuState = function() {
          if (!stickyNav) return;
          const dropdownItems = stickyNav.querySelectorAll("li.nav-with-dropdown.is-open");
          for (let i = 0; i < dropdownItems.length; i += 1) {
            dropdownItems[i].classList.remove("is-open");

          stickyBar.classList.remove("is-submenu-open");
          stickyBar.style.setProperty("--sticky-submenu-extent", "0px");

          stickyBar.style.setProperty("--sticky-bg-height", stickyBarHeight + "px");
          root.style.setProperty("--site-sticky-bar-height", stickyBarHeight + "px");
          const canScroll = (root.scrollHeight - window.innerHeight) > 2;
          const reachedTop = stickySentinel.getBoundingClientRect().top <= 0;
          const hasScrolled = (window.scrollY || root.scrollTop || 0) > 0;
          const isStuck = canScroll && reachedTop && hasScrolled;
          stickyBar.classList.toggle("is-stuck", isStuck);
          updateSubmenuState();

        updateStickyState();
        window.addEventListener("scroll", updateStickyState, { passive: true });
        window.addEventListener("resize", updateStickyState);
        window.addEventListener("load", updateStickyState);

          if (mobileMenuToggle) {
            mobileMenuToggle.addEventListener("click", function(event) {
              event.preventDefault();
              event.stopPropagation();
              if (!isMobileNav()) return;
              const nextOpen = mobileMenuPanel ? mobileMenuPanel.hidden : false;
              setMobileMenuOpen(nextOpen);
              updateSubmenuState();

          if (mobileMenuPanel) {
            mobileMenuPanel.addEventListener("click", function(event) {
              const target = event.target instanceof Element ? event.target : null;
              if (!target) return;
              const isActionTarget = !!target.closest("a, button");
              if (!isActionTarget) {
                setMobileMenuOpen(false);
                updateSubmenuState();

              }
              if (target.closest("a")) {
                if (event.defaultPrevented) return;
                setMobileMenuOpen(false);
                updateSubmenuState();

          for (let i = 0; i < mobileSubmenuLinks.length; i += 1) {
            mobileSubmenuLinks[i].addEventListener("click", function(event) {
              if (!isMobileNav()) return;
              const isExpanded = mobileSubmenuLinks[i].getAttribute("aria-expanded") === "true";
              if (isExpanded) return;
              event.preventDefault();
              event.stopPropagation();
              resetMobileSubmenus();
              setMobileSubmenuExpanded(mobileSubmenuLinks[i], true);
              updateSubmenuState();

          }
          stickyNav.addEventListener("mouseover", queueSubmenuStateUpdate, { passive: true });
          stickyNav.addEventListener("mouseout", queueSubmenuStateUpdate, { passive: true });
          stickyNav.addEventListener("focusin", queueSubmenuStateUpdate);
          stickyNav.addEventListener("focusout", queueSubmenuStateUpdate);
          document.addEventListener("pointerdown", function(event) {
            const target = event.target instanceof Element ? event.target : null;
            if (target && stickyNav.contains(target)) return;
            closeSubmenuState();
          }, { passive: true });
          window.addEventListener("blur", closeSubmenuState);
          document.addEventListener("keydown", function(event) {
            if (event.key !== "Escape") return;

          });
          document.addEventListener("visibilitychange", function() {
            if (document.hidden) closeSubmenuState();
          });
        }
        window.addEventListener("resize", function() {
          if (!isMobileNav()) {
            setMobileMenuOpen(false);
          }
        });
        const observer = new MutationObserver(updateStickyState);
        observer.observe(root, { attributes: true, attributeFilter: ["class"] });
      });

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const searchModal = document.getElementById("site-search-modal");
        if (!searchModal) return;

        const openButtons = document.querySelectorAll("[data-site-search-open]");
        const closeButtons = searchModal.querySelectorAll("[data-site-search-close]");
        const searchInput = searchModal.querySelector("#site-search-input");
        const resultsEl = searchModal.querySelector("#site-search-results");
        const indexUrl = searchModal.getAttribute("data-index-url") || "/index.json";
        const setSearchButtonsExpanded = function(expanded) {
          for (let i = 0; i < openButtons.length; i += 1) {
            openButtons[i].setAttribute("aria-expanded", expanded ? "true" : "false");
          }
        };
        setSearchButtonsExpanded(false);

        let indexData = [];
        let indexLoaded = false;
        let loadPromise = null;

        const normalize = function(value) {
          return (value || "").toString().toLowerCase().trim();
        };

        const escapeHtml = function(value) {
          return (value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\"/g, "&quot;")
            .replace(/'/g, "&#39;");
        };

        const loadIndex = function() {
          if (indexLoaded) return Promise.resolve(indexData);
          if (loadPromise) return loadPromise;
          loadPromise = window.fetch(indexUrl, { credentials: "same-origin" })
            .then(function(response) {
              if (!response.ok) throw new Error("Failed to load search index");
              return response.json();
            })
            .then(function(data) {
              indexData = Array.isArray(data) ? data : [];
              indexLoaded = true;
              return indexData;
            })
            .catch(function() {
              return [];
            });
          return loadPromise;
        };

        const escapeRegExp = function(value) {
          return (value || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        };

        const splitTerms = function(query) {
          return normalize(query)
            .split(/\s+/)
            .filter(Boolean);
        };

        const highlightKeywords = function(text, query) {
          const terms = splitTerms(query);
          if (!text || terms.length === 0) return escapeHtml(text || "");
          const pattern = terms.map(escapeRegExp).join("|");
          if (!pattern) return escapeHtml(text || "");
          const escaped = escapeHtml(text || "");
          const regex = new RegExp("(" + pattern + ")", "ig");
          return escaped.replace(regex, "<strong>$1</strong>");
        };

        const buildPreview = function(content, query) {
          const raw = (content || "").toString().replace(/\s+/g, " ").trim();
          if (!raw) return "";
          const terms = splitTerms(query);
          if (terms.length === 0) return raw.slice(0, 80);

          const lowerRaw = raw.toLowerCase();
          let matchIndex = -1;
          for (let i = 0; i < terms.length; i += 1) {
            const idx = lowerRaw.indexOf(terms[i]);
            if (idx >= 0 && (matchIndex < 0 || idx < matchIndex)) {
              matchIndex = idx;
            }
          }
          if (matchIndex < 0) return raw.slice(0, 80);

          const punctuationRegex = /[。！？.!?；;]/g;
          let sentenceStart = 0;
          let sentenceEnd = raw.length;
          let match;

          while ((match = punctuationRegex.exec(raw)) !== null) {
            const pos = match.index;
            if (pos < matchIndex) {
              sentenceStart = pos + 1;
              continue;
            }
            sentenceEnd = pos + 1;
            break;
          }

          while (
            sentenceStart < raw.length &&
            /[\s\u3000"'“”‘’」』】》）)\]]/.test(raw.charAt(sentenceStart))
          ) {
            sentenceStart += 1;
          }

          let preview = raw.slice(sentenceStart, sentenceEnd).trim();
          const maxLen = 80;
          if (preview.length > maxLen) {
            const keywordOffset = matchIndex - sentenceStart;
            const sliceStart = Math.max(0, keywordOffset - 20);
            preview = preview.slice(sliceStart, sliceStart + maxLen).trim();
            preview = preview.replace(/^[，。！？；：、,.!?;:]+/, "");
            if (sliceStart > 0) preview = "…" + preview;
            if (sentenceEnd < raw.length || sliceStart + maxLen < raw.slice(sentenceStart, sentenceEnd).length) {
              preview += "…";
            }
          }
          return preview;
        };

        const renderResults = function(query) {
          const normalizedQuery = normalize(query);
          resultsEl.innerHTML = "";
          if (!normalizedQuery) {
            return;
          }

          const matches = [];
          for (let i = 0; i < indexData.length; i += 1) {
            const item = indexData[i] || {};
            const title = normalize(item.title);
            const content = normalize(item.content);
            if (!title.includes(normalizedQuery) && !content.includes(normalizedQuery)) continue;

            matches.push({
              title: item.title || "",
              content: item.content || "",
              section: item.section || "",
              date: item.date || "",
              permalink: item.permalink || "/",
            });
          }

          matches.sort(function(a, b) {
            return (b.date || "").localeCompare(a.date || "");
          });

          const visible = matches.slice(0, 40);
          if (visible.length === 0) return;

          const html = visible.map(function(item) {
            const title = highlightKeywords(item.title, normalizedQuery);
            const preview = highlightKeywords(buildPreview(item.content, normalizedQuery), normalizedQuery);
            const previewHtml = preview ? '<span class="site-search-result-preview">' + preview + "</span>" : "";
            const meta = escapeHtml([item.section, item.date].filter(Boolean).join(" · "));
            const href = escapeHtml(item.permalink);
            return (
              '<li><a href="' + href + '">' +
                '<span class="site-search-result-title">' + title + "</span>" +
                previewHtml +
                '<span class="site-search-result-meta">' + meta + "</span>" +
              "</a></li>"
            );
          }).join("");
          resultsEl.innerHTML = html;
        };

        const openSearch = function() {
          const isMobileNav = window.matchMedia("(max-width: 911px)").matches;
          if (isMobileNav) {
            const stickyBar = document.querySelector(".site-sticky-bar");
            const mobileMenuPanel = document.getElementById("site-mobile-menu-panel");
            const mobileMenuToggle = document.querySelector(".site-mobile-menu-toggle");
            if (mobileMenuPanel) {
              mobileMenuPanel.hidden = true;
            }
            if (mobileMenuToggle) {
              mobileMenuToggle.setAttribute("aria-expanded", "false");
            }
            if (stickyBar) {
              stickyBar.classList.remove("is-submenu-open");
              stickyBar.style.setProperty("--sticky-submenu-extent", "0px");
            }
          }
          searchModal.hidden = false;
          setSearchButtonsExpanded(true);
          loadIndex().then(function() {
            renderResults(searchInput ? searchInput.value : "");
          });
          window.setTimeout(function() {
            if (searchInput) searchInput.focus();
          }, 0);
        };

        const closeSearch = function() {
          searchModal.hidden = true;
          setSearchButtonsExpanded(false);
        };

        for (let i = 0; i < openButtons.length; i += 1) {
          openButtons[i].addEventListener("click", function(event) {
            event.preventDefault();
            event.stopPropagation();
            openSearch();
          });
        }

        for (let i = 0; i < closeButtons.length; i += 1) {
          closeButtons[i].addEventListener("click", function(event) {
            event.preventDefault();
            closeSearch();
          });
        }

        if (searchInput) {
          searchInput.addEventListener("input", function() {
            renderResults(searchInput.value);
          });
        }

        resultsEl.addEventListener("click", function(event) {
          const target = event.target instanceof Element ? event.target : null;
          if (!target) return;
          if (target.closest("a")) {
            closeSearch();
          }
        });

        document.addEventListener("keydown", function(event) {
          if (event.key === "Escape" && !searchModal.hidden) {
            closeSearch();
          }
        });
      });
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const tooltipTriggers = Array.from(document.querySelectorAll("[data-hover-tooltip]"));
        if (tooltipTriggers.length === 0) return;

        let tooltipEl = null;
        let activeTrigger = null;
        let showTimer = 0;

        const ensureTooltip = function() {
          if (tooltipEl && tooltipEl.isConnected) return tooltipEl;
          tooltipEl = document.createElement("div");
          tooltipEl.className = "site-hover-tooltip";
          document.body.appendChild(tooltipEl);
          return tooltipEl;
        };

        const clearShowTimer = function() {
          if (!showTimer) return;
          window.clearTimeout(showTimer);
          showTimer = 0;
        };

        const hideTooltip = function() {
          clearShowTimer();
          if (!tooltipEl) return;
          tooltipEl.classList.remove("is-visible");
          activeTrigger = null;
        };

        const positionTooltip = function(trigger) {
          if (!tooltipEl || !trigger || !tooltipEl.classList.contains("is-visible")) return;
          const rect = trigger.getBoundingClientRect();
          const tooltipRect = tooltipEl.getBoundingClientRect();
          const margin = 10;
          const center = rect.left + (rect.width * 0.5);
          const minX = margin + (tooltipRect.width * 0.5);
          const maxX = window.innerWidth - margin - (tooltipRect.width * 0.5);
          const clampedX = Math.max(minX, Math.min(maxX, center));
          const top = Math.min(window.innerHeight - tooltipRect.height - margin, rect.bottom + 8);
          tooltipEl.style.left = clampedX + "px";
          tooltipEl.style.top = top + "px";
        };

        const showTooltip = function(trigger) {
          const text = trigger.getAttribute("data-hover-tooltip");
          if (!text) return;
          const el = ensureTooltip();
          el.textContent = text;
          el.classList.add("is-visible");
          activeTrigger = trigger;
          positionTooltip(trigger);
        };

        const scheduleTooltip = function(trigger) {
          hideTooltip();
          const rawDelay = parseInt(trigger.getAttribute("data-hover-tooltip-delay") || "", 10);
          const delay = Number.isFinite(rawDelay) ? rawDelay : 1500;
          showTimer = window.setTimeout(function() {
            showTimer = 0;
            showTooltip(trigger);
          }, Math.max(0, delay));
        };

        tooltipTriggers.forEach(function(trigger) {
          trigger.addEventListener("pointerenter", function() {
            scheduleTooltip(trigger);
          }, { passive: true });

          trigger.addEventListener("pointerleave", hideTooltip, { passive: true });
          trigger.addEventListener("pointerdown", hideTooltip, { passive: true });

          trigger.addEventListener("focus", function() {
            scheduleTooltip(trigger);
          }, { passive: true });

          trigger.addEventListener("blur", hideTooltip, { passive: true });
        });

        window.addEventListener("scroll", function() {
          if (!activeTrigger) return;
          positionTooltip(activeTrigger);
        }, { passive: true, capture: true });

        window.addEventListener("resize", function() {
          if (!activeTrigger) return;
          positionTooltip(activeTrigger);
        }, { passive: true });

        document.addEventListener("visibilitychange", function() {
          if (document.hidden) hideTooltip();
        });
      });
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const paragraphSelector = "#content p, #content li";
        const cjkCharRe = /^[\u3040-\u30ff\u3400-\u9fff\uf900-\ufaff\uff66-\uff9f]$/;
        const latinDigitRe = /^[A-Za-z0-9]$/;
        const closingQuoteLikeRe = /^[\"'“”‘’「」『』【】《》（）()\[\]]$/;
        const endingPuncRe = /^[，。！？；：、,.!?;:）)」』】》”’…]$/;

        const getLineBands = function(el) {
          const range = document.createRange();
          range.selectNodeContents(el);
          const rawRects = Array.from(range.getClientRects());
          if (typeof range.detach === "function") range.detach();
          const validRects = rawRects.filter(function(rect) {
            return rect.width > 1 && rect.height > 1;
          });
          if (validRects.length === 0) return [];

          const lines = [];
          validRects.forEach(function(rect) {
            const key = Math.round(rect.top);
            const last = lines.length > 0 ? lines[lines.length - 1] : null;
            if (!last || Math.abs(last.key - key) > 1) {
              lines.push({ key: key, left: rect.left, right: rect.right });
              return;
            }
            last.left = Math.min(last.left, rect.left);
            last.right = Math.max(last.right, rect.right);
          });
          return lines;
        };

        const normalizeParagraph = function(el) {
          const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
          let node = walker.nextNode();
          while (node) {
            const text = node.nodeValue || "";
            if (text.indexOf("\u2060") >= 0) {
              node.nodeValue = text.replace(/\u2060/g, "");
            }
            node = walker.nextNode();
          }
        };

        const getParagraphChars = function(el) {
          const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
          const chars = [];
          let node = walker.nextNode();
          while (node) {
            const text = node.nodeValue || "";
            for (let i = 0; i < text.length; i += 1) {
              const ch = text.charAt(i);
              if (/\s/.test(ch)) continue;
              const range = document.createRange();
              range.setStart(node, i);
              range.setEnd(node, i + 1);
              const rect = range.getBoundingClientRect();
              if (typeof range.detach === "function") range.detach();
              if (rect.width <= 0 || rect.height <= 0) continue;
              chars.push({
                ch: ch,
                node: node,
                offset: i,
                top: Math.round(rect.top),
                left: rect.left,
              });
            }
            node = walker.nextNode();
          }
          return chars;
        };

        const getLastLineChars = function(chars) {
          if (chars.length === 0) return [];
          let maxTop = -Infinity;
          chars.forEach(function(item) {
            if (item.top > maxTop) maxTop = item.top;
          });
          return chars
            .filter(function(item) {
              return Math.abs(item.top - maxTop) <= 1;
            })
            .sort(function(a, b) {
              return a.left - b.left;
            });
        };

        const getWidowPattern = function(el) {
          const lines = getLineBands(el);
          if (lines.length < 2) return null;
          const paragraphChars = getParagraphChars(el);
          if (paragraphChars.length < 2) return null;
          const lastLineChars = getLastLineChars(paragraphChars);
          if (lastLineChars.length === 1) {
            const onlyChar = lastLineChars[0].ch;
            if (endingPuncRe.test(onlyChar)) {
              return { type: "punct_only", paragraphChars: paragraphChars };
            }
            return null;
          }

          if (lastLineChars.length !== 2) return null;
          const firstChar = lastLineChars[0].ch;
          const secondChar = lastLineChars[1].ch;
          const firstIsLetterLike = cjkCharRe.test(firstChar) || latinDigitRe.test(firstChar) || closingQuoteLikeRe.test(firstChar);
          if (firstIsLetterLike && endingPuncRe.test(secondChar)) {
            return { type: "char_plus_punc", paragraphChars: paragraphChars };
          }
          return null;
        };

        const insertNoBreakByPattern = function(pattern) {
          if (!pattern || !pattern.paragraphChars) return;
          const paragraphChars = pattern.paragraphChars;
          let anchorIndex = -1;
          if (pattern.type === "punct_only") {
            anchorIndex = paragraphChars.length - 2;
          } else if (pattern.type === "char_plus_punc") {
            anchorIndex = paragraphChars.length - 3;
          }
          if (anchorIndex < 0 || anchorIndex >= paragraphChars.length) return;
          const anchor = paragraphChars[anchorIndex];
          if (!anchor || !anchor.node) return;
          const text = anchor.node.nodeValue || "";
          const pos = anchor.offset + 1;
          anchor.node.nodeValue = text.slice(0, pos) + "\u2060" + text.slice(pos);
        };

        const tuneParagraph = function(el) {
          if (!el) return;
          if (el.closest(".single-jump-panel")) return;
          normalizeParagraph(el);
          for (let i = 0; i < 3; i += 1) {
            const pattern = getWidowPattern(el);
            if (!pattern) break;
            insertNoBreakByPattern(pattern);
          }
        };

        const applyWidowControl = function() {
          const paragraphs = document.querySelectorAll(paragraphSelector);
          paragraphs.forEach(tuneParagraph);
        };

        let resizeTimer = null;
        const scheduleApply = function() {
          if (resizeTimer) window.clearTimeout(resizeTimer);
          resizeTimer = window.setTimeout(function() {
            window.requestAnimationFrame(applyWidowControl);
          }, 120);
        };

        applyWidowControl();
        window.addEventListener("load", applyWidowControl);
        window.addEventListener("resize", scheduleApply);
      });
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const anchors = document.querySelectorAll("a[href]");
        anchors.forEach(function(anchor) {
          const rawHref = (anchor.getAttribute("href") || "").trim();
          if (!rawHref) return;
          if (/^(#|mailto:|tel:|javascript:)/i.test(rawHref)) return;

          let parsed;
          try {
            parsed = new URL(rawHref, window.location.href);
          } catch (e) {
            return;
          }

          const isWebLink = /^https?:$/i.test(parsed.protocol);
          const isExternal = parsed.origin !== window.location.origin;
          if (!isWebLink || !isExternal) return;

          anchor.setAttribute("target", "_blank");

          anchor.classList.add("is-external-link");

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const currentSection = (document.body && document.body.dataset && document.body.dataset.section) || "";
        const isHome = !!(document.body && document.body.classList && document.body.classList.contains("is-home"));
        const isPostSingle = !!(document.body && document.body.classList && document.body.classList.contains("page-post-single"));
        if (isHome) return;
        if (currentSection === "collection") return;
        if (currentSection === "posts" && !isPostSingle) return;

        const titleCache = new Map();
        const inflight = new Map();

        const normalizeText = function(value) {
          return (value || "").replace(/\s+/g, " ").trim();
        };

        const extractTitleFromHtml = function(html) {
          if (!html) return "";
          const doc = new DOMParser().parseFromString(html, "text/html");
          return normalizeText(doc && doc.title ? doc.title : "");
        };

        const parseLinkUrl = function(link) {
          const rawHref = (link.getAttribute("href") || "").trim();
          if (!rawHref || /^(#|mailto:|tel:|javascript:)/i.test(rawHref)) return null;
          try {
            return new URL(rawHref, window.location.href);
          } catch (error) {
            return null;
          }
        };

        const getFallbackText = function(link, url) {
          if (!url) return "";
          if (url.origin === window.location.origin) {
            return normalizeText(link.textContent) || normalizeText(url.pathname);
          }
          return normalizeText(url.hostname.replace(/^www\./i, ""));
        };

        const ensureFallbackTitle = function(link) {
          if (!(link instanceof HTMLAnchorElement)) return null;
          if (link.hasAttribute("data-hover-tooltip")) return null;
          if (link.classList.contains("collection-auto-link")) return null;
          if (link.classList.contains("single-jump-link")) return null;
          if (link.closest(".single-jump-menu")) return null;

          const url = parseLinkUrl(link);
          if (!url) return null;

          if (link.hasAttribute("title")) return url;

          const fallback = getFallbackText(link, url);
          if (!fallback) return url;
          link.setAttribute("title", fallback);
          link.dataset.autoTitleFallback = "1";
          return url;
        };

        const fetchLinkTitle = async function(url) {
          const cacheKey = url.href.split("#")[0];
          if (titleCache.has(cacheKey)) return titleCache.get(cacheKey) || "";
          if (inflight.has(cacheKey)) return inflight.get(cacheKey);

          const request = (async function() {
            try {
              const isSameOrigin = url.origin === window.location.origin;
              const response = await fetch(url.href, {
                method: "GET",
                credentials: isSameOrigin ? "same-origin" : "omit"
              });
              if (!response.ok) return "";
              const contentType = (response.headers.get("content-type") || "").toLowerCase();
              if (!contentType.includes("text/html")) return "";
              const html = await response.text();
              return extractTitleFromHtml(html);
            } catch (error) {
              return "";
            }
          })();

          inflight.set(cacheKey, request);
          const result = await request;
          inflight.delete(cacheKey);
          titleCache.set(cacheKey, result || "");
          return result || "";
        };

        const warmLinkTitle = async function(link) {
          if (!(link instanceof HTMLAnchorElement)) return;
          if (link.dataset.autoTitleReady === "1") return;

          const url = ensureFallbackTitle(link);
          if (!url) return;
          if (link.hasAttribute("title") && link.dataset.autoTitleFallback !== "1") {
            link.dataset.autoTitleReady = "1";
            return;
          }

          const title = await fetchLinkTitle(url);
          if (title) {
            link.setAttribute("title", title);
            link.dataset.autoTitleFallback = "0";
          }
          link.dataset.autoTitleReady = "1";
        };

        document.querySelectorAll("#content a[href]").forEach(function(link) {
          ensureFallbackTitle(link);
        });

        document.addEventListener("mouseover", function(event) {
          const target = event.target instanceof Element ? event.target.closest("#content a[href]") : null;
          if (!target) return;
          void warmLinkTitle(target);
        }, { passive: true });

        document.addEventListener("focusin", function(event) {
          const target = event.target instanceof Element ? event.target.closest("#content a[href]") : null;
          if (!target) return;
          void warmLinkTitle(target);
        }, { passive: true });
      });
    </script>

  </body>
</html>
